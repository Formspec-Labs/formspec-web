server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1;
  gzip_comp_level 6;
  gzip_types
    application/javascript
    application/json
    application/wasm
    image/svg+xml
    text/css
    text/javascript;

  location = /formspec-runtime-config.js {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    add_header content-type text/plain;
    return 200 "ok\n";
  }
}
