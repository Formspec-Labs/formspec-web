name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:testing-plan
      - run: npm run test:conformance
      - run: npm run test:unit
      - run: npm run check:vendor-leaks
      - uses: actions/checkout@v4
        with:
          repository: Formspec-org/formspec
          path: formspec-source
      - run: npm run check:upstream-theme
        env:
          FORMSPEC_SOURCE_DIR: formspec-source
      - run: npm run test:e2e
      - run: npm run build
      - run: npm run check:bundle-budget
      - run: npm run check:compose-config
      - run: npm run test:deployment
      - run: npm run test:multi-deployment
